kind = "web"
previewPath = "/"
title = "The Way OSS Website"
version = "1.0.0"
id = "artifacts/thewayoss-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22612

[services.development]
run = "pnpm --filter @workspace/thewayoss-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/thewayoss-website", "run", "build" ]
publicDir = "artifacts/thewayoss-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22612"
BASE_PATH = "/"
